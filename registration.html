<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — TravelLine Tech</title>
    <link rel="stylesheet" href="assets/css/style.min.css">
    <link rel="stylesheet" href="assets/css/simple-copy.css">
</head>
<body>
    <main class="container registration-page">
        <section class="card registration-card">
            <h1 class="hero_h1">Регистрация</h1>
            <p class="hero_p">Создайте учётную запись и получайте лучшие вакансии первыми.</p>
            <form class="registration-form" action="#" method="post">
                <label>
                    Имя
                    <input type="text" name="name" placeholder="Введите имя" required>
                </label>
                <label>
                    Email
                    <input type="email" name="email" placeholder="example@mail.ru" required>
                </label>
                <label>
                    Пароль
                    <input type="password" name="password" placeholder="Введите пароль" required>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="terms" required>
                    Я принимаю условия пользовательского соглашения
                </label>
                <button type="submit" class="button-primary">Зарегистрироваться</button>
            </form>
            <p class="small-note">Уже есть аккаунт? <a href="#">Войти</a></p>
        </section>
    </main>
</body>
</html>
